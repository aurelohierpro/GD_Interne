<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Development — Interne</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/deck.gl@9.0.35/dist.min.js"></script>
</head>
<body>
  <div id="stars-container"></div>

  <div id="container">
    <canvas id="halo-canvas"></canvas>

    <div id="ui-top-left" class="panel">
      <div class="header-block">
        <div class="title-main">GLOBAL DEVELOPMENT</div>
        <div class="title-sub">Carte interne — exploration multi-filtres des projets du groupe</div>
      </div>

      <div id="ui-stats">
        <div class="stat">
          <div class="stat-value" id="stat-projects">–</div>
          <div class="stat-label">Lignes / projets</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-countries">–</div>
          <div class="stat-label">Pays couverts</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-amount">–</div>
          <div class="stat-label">Montant cumulé</div>
        </div>
      </div>
    </div>

    <div id="ui-top-right" class="panel">
      <div class="controls-title">Indicateur affiché</div>
      <div class="segmented">
        <button id="btnProjects" class="seg-btn active">Nombre de projets</button>
        <button id="btnAmount" class="seg-btn">Montant cumulé</button>
      </div>

      <div class="controls-title filters-title">Filtres cumulables</div>

      <div class="filter-block">
        <label class="filter-label" for="filterFunder">Bailleur</label>
        <select id="filterFunder">
          <option value="ALL">Tous les bailleurs</option>
        </select>
      </div>

      <div class="filter-block">
        <label class="filter-label" for="filterResponsible">Responsable</label>
        <select id="filterResponsible">
          <option value="ALL">Tous les responsables</option>
        </select>
      </div>

      <div class="filter-block">
        <label class="filter-label" for="filterFiliale">Filiale</label>
        <select id="filterFiliale">
          <option value="ALL">Toutes les filiales</option>
        </select>
      </div>

      <div class="filter-block">
        <label class="filter-label" for="filterSector">Secteur</label>
        <select id="filterSector">
          <option value="ALL">Tous les secteurs</option>
        </select>
      </div>

      <div class="filter-block">
        <label class="filter-label" for="filterExpert">Expert</label>
        <select id="filterExpert">
          <option value="ALL">Tous les experts</option>
        </select>
      </div>

      <div class="filter-block">
        <label class="filter-label" for="amountSlider">Montant minimum</label>
        <div class="amount-slider-wrapper">
          <div class="amount-slider-label">
            <span>0 EUR</span>
            <span>5 M EUR</span>
          </div>
          <input
            type="range"
            id="amountSlider"
            min="0"
            max="5000000"
            step="50000"
            value="0"
          />
          <div class="amount-slider-value" id="amountSliderLabel">≥ 0 EUR</div>
        </div>
      </div>

      <div class="filter-actions">
        <button id="btnResetFilters" class="seg-btn secondary-btn">Réinitialiser les filtres</button>
      </div>
    </div>

    <div id="ui-active-filters" class="panel">
      <div class="legend-title">Filtres actifs</div>
      <div id="activeFiltersContent" class="active-filters-content">Aucun filtre</div>
    </div>

    <div id="ui-legend" class="panel">
      <div class="legend-title" id="legendTitle">Nombre de projets</div>
      <div id="legendItems"></div>
    </div>

    <div id="ui-export" class="panel">
      <div class="controls-title">Export carte</div>
      <button id="btnExport" class="seg-btn active" style="width:100%; margin-top:4px;">
        Exporter en PNG
      </button>
      <div id="exportStatus"></div>
    </div>

    <div id="tooltip"></div>
  </div>

  <script src="./script.js?v=1"></script>
</body>
</html>
